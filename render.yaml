services:
  - type: web
    name: pulseboard-mcp
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST
        value: 0.0.0.0
      - key: PULSEBOARD_STORAGE
        value: github
      - key: PULSEBOARD_GITHUB_REF
        value: main
      - key: PULSEBOARD_INSTALLS_PATH
        value: /var/data/pulseboard-installs.json
      - key: PULSEBOARD_ENABLE_WRITE_TOOLS
        value: "1"
      - key: PULSEBOARD_PUBLIC_URL
        sync: false
      - key: PULSEBOARD_OAUTH_ISSUER
        sync: false
      - key: PULSEBOARD_OAUTH_AUDIENCE
        sync: false
      - key: PULSEBOARD_OAUTH_JWKS_URL
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
    disk:
      name: pulseboard-data
      mountPath: /var/data
      sizeGB: 1
