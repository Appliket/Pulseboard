<!doctype html>
<meta charset="utf-8">
<title>Trackalo Graph</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 920px; }
  code { background: #f3f4f6; padding: 0.1rem 0.25rem; border-radius: 4px; }
  li { margin: 0.35rem 0; }
</style>
<h1>Trackalo Graph</h1>
<p>This lightweight viewer reads <code>graph.json</code>. Generated graph data is rebuildable and not source of truth.</p>
<h2>Nodes</h2>
<ul id="nodes"></ul>
<h2>Edges</h2>
<ul id="edges"></ul>
<script>
fetch("graph.json")
  .then((response) => response.json())
  .then((graph) => {
    document.getElementById("nodes").innerHTML = graph.nodes
      .map((node) => `<li><code>${node.id}</code> ${node.kind} ${node.status || ""}</li>`)
      .join("");
    document.getElementById("edges").innerHTML = graph.edges
      .map((edge) => `<li><code>${edge.source}</code> -> <code>${edge.target}</code> ${edge.type}</li>`)
      .join("");
  });
</script>
