<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Technical Project Wiki Graph</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; color: #1f2937; }
    #graph { white-space: pre-wrap; background: #f8fafc; border: 1px solid #cbd5e1; padding: 1rem; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Technical Project Wiki Graph</h1>
  <p>Generated from markdown links, task metadata, components, repositories, areas, and states.</p>
  <pre id="graph">Loading graph.json...</pre>
  <script>
    fetch("graph.json")
      .then((response) => response.json())
      .then((data) => {
        document.getElementById("graph").textContent = JSON.stringify(data, null, 2);
      })
      .catch((error) => {
        document.getElementById("graph").textContent = "Unable to load graph.json: " + error;
      });
  </script>
</body>
</html>
